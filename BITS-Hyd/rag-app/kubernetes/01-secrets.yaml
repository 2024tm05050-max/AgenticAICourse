# Qwen3-8B-Instruct is a public model, so this secret is OPTIONAL.
# Create it only if you need a Hugging Face token (e.g. for a gated model,
# or to avoid anonymous rate limits):
#
#   kubectl create secret generic hf-secret \
#     --namespace rag-system \
#     --from-literal=HF_TOKEN=<your-hf-token>
#
# The manifest below is a template for reference / GitOps — prefer the
# kubectl command above so the token never sits in plaintext in git.
apiVersion: v1
kind: Secret
metadata:
  name: hf-secret
  namespace: rag-system
type: Opaque
stringData:
  HF_TOKEN: "REPLACE_ME"
